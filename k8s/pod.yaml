apiVersion: v1
kind: Pod
metadata:
  name: computer-use-poc
  labels:
    app: computer-use-poc
spec:
  restartPolicy: Never
  containers:
    - name: agent
      # Ganti dengan path image hasil push (Artifact Registry / GCR)
      image: REGION-docker.pkg.dev/PROJECT_ID/REPO/computer-use-poc:latest
      # Pod idle. Kita exec masuk lalu jalanin orchestrator.py manual (kontrol timing demo).
      command: ["/bin/sh", "-c"]
      args:
        - "echo 'Pod ready. Exec masuk lalu: cd /app/poc && python orchestrator.py --user 1'; sleep infinity"
      env:
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-api-key
              key: GEMINI_API_KEY
        - name: PLAYWRIGHT_HEADLESS
          value: "true"
      resources:
        requests:
          cpu: "500m"
          memory: "1Gi"
        limits:
          cpu: "1"
          memory: "2Gi"
